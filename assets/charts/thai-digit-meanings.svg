<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" role="img" aria-label="A guide to how single digits 0 to 9 are viewed in Thai number culture: 3, 5, 8 and 9 are seen as lucky, 4 is avoided, 6 and 7 are mixed, and 0, 1, 2 are broadly neutral.">
<rect width="900" height="250" fill="transparent"/>
<text x="20" y="30" font-family="Kanit,sans-serif" font-size="16" font-weight="600" fill="#F5F7FA">How single digits are viewed in Thai culture</text>
<rect x="20.0" y="54" width="75.2" height="130" rx="10" fill="#3A4480"/><text x="57.6" y="112" text-anchor="middle" font-family="Kanit,sans-serif" font-size="42" font-weight="700" fill="#C3C9E6">0</text><text x="57.6" y="146" text-anchor="middle" font-family="monospace" font-size="11" fill="#C3C9E6">neutral</text><rect x="107.2" y="54" width="75.2" height="130" rx="10" fill="#3A4480"/><text x="144.8" y="112" text-anchor="middle" font-family="Kanit,sans-serif" font-size="42" font-weight="700" fill="#C3C9E6">1</text><text x="144.8" y="146" text-anchor="middle" font-family="monospace" font-size="11" fill="#C3C9E6">first</text><rect x="194.4" y="54" width="75.2" height="130" rx="10" fill="#3A4480"/><text x="232.0" y="112" text-anchor="middle" font-family="Kanit,sans-serif" font-size="42" font-weight="700" fill="#C3C9E6">2</text><text x="232.0" y="146" text-anchor="middle" font-family="monospace" font-size="11" fill="#C3C9E6">pairs</text><rect x="281.6" y="54" width="75.2" height="130" rx="10" fill="#F2C14E"/><text x="319.2" y="112" text-anchor="middle" font-family="Kanit,sans-serif" font-size="42" font-weight="700" fill="#0B1026">3</text><text x="319.2" y="146" text-anchor="middle" font-family="monospace" font-size="11" fill="#0B1026">growth</text><rect x="368.8" y="54" width="75.2" height="130" rx="10" fill="#C9484B"/><text x="406.4" y="112" text-anchor="middle" font-family="Kanit,sans-serif" font-size="42" font-weight="700" fill="#F5D4D4">4</text><text x="406.4" y="146" text-anchor="middle" font-family="monospace" font-size="11" fill="#F5D4D4">avoid</text><rect x="456.0" y="54" width="75.2" height="130" rx="10" fill="#F2C14E"/><text x="493.6" y="112" text-anchor="middle" font-family="Kanit,sans-serif" font-size="42" font-weight="700" fill="#0B1026">5</text><text x="493.6" y="146" text-anchor="middle" font-family="monospace" font-size="11" fill="#0B1026">laughter</text><rect x="543.2" y="54" width="75.2" height="130" rx="10" fill="#C8901F"/><text x="580.8" y="112" text-anchor="middle" font-family="Kanit,sans-serif" font-size="42" font-weight="700" fill="#0B1026">6</text><text x="580.8" y="146" text-anchor="middle" font-family="monospace" font-size="11" fill="#0B1026">mixed</text><rect x="630.4" y="54" width="75.2" height="130" rx="10" fill="#C8901F"/><text x="668.0" y="112" text-anchor="middle" font-family="Kanit,sans-serif" font-size="42" font-weight="700" fill="#0B1026">7</text><text x="668.0" y="146" text-anchor="middle" font-family="monospace" font-size="11" fill="#0B1026">spiritual</text><rect x="717.6" y="54" width="75.2" height="130" rx="10" fill="#F2C14E"/><text x="755.2" y="112" text-anchor="middle" font-family="Kanit,sans-serif" font-size="42" font-weight="700" fill="#0B1026">8</text><text x="755.2" y="146" text-anchor="middle" font-family="monospace" font-size="11" fill="#0B1026">wealth</text><rect x="804.8" y="54" width="75.2" height="130" rx="10" fill="#F2C14E"/><text x="842.4" y="112" text-anchor="middle" font-family="Kanit,sans-serif" font-size="42" font-weight="700" fill="#0B1026">9</text><text x="842.4" y="146" text-anchor="middle" font-family="monospace" font-size="11" fill="#0B1026">progress</text>
<rect x="20" y="218" width="12" height="12" rx="2" fill="#F2C14E"/><text x="38" y="228" font-family="monospace" font-size="11" fill="#9AA3C7">lucky</text><rect x="130" y="218" width="12" height="12" rx="2" fill="#C8901F"/><text x="148" y="228" font-family="monospace" font-size="11" fill="#9AA3C7">mixed</text><rect x="240" y="218" width="12" height="12" rx="2" fill="#C9484B"/><text x="258" y="228" font-family="monospace" font-size="11" fill="#9AA3C7">caution</text><rect x="358" y="218" width="12" height="12" rx="2" fill="#3A4480"/><text x="376" y="228" font-family="monospace" font-size="11" fill="#9AA3C7">neutral</text>
</svg>